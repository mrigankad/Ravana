# Face Swap SDK — CI/CD Pipeline
# Runs tests, lint, type-check, and benchmarks on every push/PR

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Lint & Type Check ────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install linters
        run: pip install flake8 mypy black isort

      - name: Run Black (format check)
        run: black --check --diff face_swap/ tests/

      - name: Run isort (import check)
        run: isort --check-only --diff face_swap/ tests/

      - name: Run Flake8
        run: flake8 face_swap/ tests/ --max-line-length 120 --ignore E203,W503

      - name: Run mypy (type check)
        run: mypy face_swap/ --ignore-missing-imports --no-error-summary
        continue-on-error: true  # Type hints are best-effort

  # ── Unit Tests ───────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-glx libglib2.0-0 ffmpeg

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-xdist

      - name: Run Unit Tests
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            --cov=face_swap \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -x

      - name: Upload Coverage
        if: matrix.python-version == '3.10'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ── Integration Tests ────────────────────────────────────────────────
  integration:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-glx libglib2.0-0 ffmpeg
          pip install -r requirements.txt
          pip install pytest

      - name: Run Integration Tests
        run: |
          pytest tests/test_integration.py \
            -v \
            --tb=long \
            -x

  # ── Native Build Test ────────────────────────────────────────────────
  native-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libopencv-dev

      - name: Build native library
        run: |
          cd face_swap/native
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DWITH_OPENCV=ON \
            -DWITH_ONNXRUNTIME=OFF \
            -DBUILD_TESTS=ON
          cmake --build build

      - name: Run native tests
        run: ./face_swap/native/build/fs_test_native
        continue-on-error: true  # May fail without models

  # ── Docker Build ─────────────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t face-swap:ci \
            --target python-deps \
            .
        continue-on-error: true  # Full build needs CUDA
